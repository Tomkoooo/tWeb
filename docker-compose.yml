version: '3.8'

# =============================================
# TEMPLATE FOR PORTAINER SWARM STACK
# =============================================

services:

  # ==================== YOUR MAIN APPLICATION ====================
  your-app-name:                    # ← Change this (service name)
    image: your-image:tag           # ← Put your image here (e.g. ghcr.io/tomkoooo/tdarts:main)
    container_name: your-app-name   # ← Container name (recommended to match service name)
    restart: unless-stopped
    
    # Labels for WUD (What's Up Docker)
    labels:
      - wud.watch=true              # Enable watching this service
      - wud.tag=include             # Options: include / semver / latest
    
    # Healthcheck - VERY IMPORTANT for zero-downtime updates
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]  # ← Change to your real health endpoint
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Zero-downtime rolling update configuration (Optional but recommended)
    deploy:
      replicas: 2                          # Use 2+ for zero downtime
      update_config:
        parallelism: 1                     # Update one container at a time
        delay: 15s                         # Time between container updates
        order: start-first                 # Start new BEFORE stopping old → Zero downtime
        failure_action: rollback
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

    environment:
      # Add your environment variables here
      - TZ=Europe/Berlin
      # - KEY=value

    networks:
      - default
      - nginxproxy_default               # ← Required for Nginx proxy

  # ==================== ADD MORE SERVICES HERE ====================
  # Example: Socket Service
  # your-socket:
  #   image: ghcr.io/... 
  #   container_name: your-socket
  #   ... (copy the same structure as above)

  # ==================== WUD - IMAGE UPDATE WATCHER ====================
  wud:
    image: ghcr.io/getwud/wud:latest
    container_name: wud
    restart: unless-stopped
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    ports:
      - "3004:3000"                     # WUD Web UI
    
    environment:
      - WUD_WATCHER_LOCAL_CRON=*/2 * * * *   # Check every 2 minutes
      - WUD_TRIGGER_DOCKER_LOCAL_ENABLED=true
      - WUD_TRIGGER_DOCKER_LOCAL_THRESHOLD=patch     # Options: major / minor / patch
      - WUD_TRIGGER_DOCKER_LOCAL_CLEANUP=true
      - WUD_TRIGGER_DOCKER_LOCAL_PRUNE=true
      
      # Optional: Add notifications
      # - WUD_NOTIF_DISCORD_WEBHOOK=your-discord-webhook
      # - WUD_NOTIF_SLACK_WEBHOOK=your-slack-webhook

    networks:
      - default

# =============================================
# NETWORKS
# =============================================
networks:
  default:
    driver: overlay                     # Required for Swarm
    
  nginxproxy_default:
    external: true                      # Important - connects to your existing Nginx network